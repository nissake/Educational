<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nissake's Education Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      margin: 0;
      padding: 20px;
      line-height: 1.4;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 20px;
      margin-top: 30px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
    }
    a {
      color: #0645ad;
      text-decoration: none;
      display: block;
      padding: 4px 0;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>Nissake's Education Page</h1>

  <h2>Math</h2>
  <div id="math-list">Loading…</div>

  <h2>Reading</h2>
  <div id="reading-list">Loading…</div>

  <h2>For Fun</h2>
  <div id="forfun-list">Loading…</div>

  <script>
  // Convert filenames into nice titles
  function prettyName(filename) {
    return filename
      .replace(".html", "")
      .replace(/[-_]/g, " ")
      .replace(/\s+/g, " ")
      .trim()
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  // Load files from a repo folder using GitHub API
  function loadFolder(folder, elementId) {
    const apiUrl = `https://api.github.com/repos/nissake/Educational/contents/${folder}`;

    fetch(apiUrl)
      .then(r => {
        if (!r.ok) throw new Error("API error");
        return r.json();
      })
      .then(items => {
        const container = document.getElementById(elementId);
        container.innerHTML = "";

        // Filter for .html files, ignore .keep and non-files
        const htmlFiles = items
          .filter(item =>
            item.type === "file" &&
            item.name.endsWith(".html") &&
            item.name !== "index.html"
          )
          .sort((a, b) => a.name.localeCompare(b.name));

        if (htmlFiles.length === 0) {
          container.textContent = "(none yet)";
          return;
        }

        htmlFiles.forEach(item => {
          const file = item.name;
          const a = document.createElement("a");

          // ⭐ Corrected link path for GitHub Pages project site
          a.href = `./Educational/${folder}${file}`;


          a.textContent = prettyName(file);
          container.appendChild(a);
        });
      })
      .catch(() => {
        document.getElementById(elementId).textContent = "(folder not found)";
      });
  }

  loadFolder("math/", "math-list");
  loadFolder("reading/", "reading-list");
  loadFolder("forfun/", "forfun-list");
  </script>

</body>
</html>
