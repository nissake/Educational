<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Education</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <base href="/Educational/">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      margin: 0;
      padding: 20px;
      line-height: 1.4;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 20px;
      margin-top: 30px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      text-transform: capitalize;
    }
    a {
      color: #0645ad;
      text-decoration: none;
      display: block;
      padding: 4px 0;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>Nissake's Education Page</h1>

  <div id="content"></div>

  <script>
    // Convert folder names into nice titles
    function prettyFolder(name) {
      return name.replace(/[-_]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }

    // Convert filenames into nice titles
    function prettyFile(filename) {
      return filename
        .replace(".html", "")
        .replace(/[-_]/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    // Load all folders in the repo root
    fetch("https://api.github.com/repos/nissake/Educational/contents/")
      .then(r => r.json())
      .then(items => {
        const folders = items.filter(item => item.type === "dir");
        const container = document.getElementById("content");

        folders.forEach(folder => {
          const folderName = folder.name;

          // Create headline
          const h2 = document.createElement("h2");
          h2.textContent = prettyFolder(folderName);
          container.appendChild(h2);

          // Create list container
          const listDiv = document.createElement("div");
          listDiv.textContent = "Loading…";
          container.appendChild(listDiv);

          // Load files inside folder
          fetch(`https://api.github.com/repos/nissake/Educational/contents/${folderName}`)
            .then(r => r.json())
            .then(files => {
              listDiv.innerHTML = "";

              const htmlFiles = files.filter(f => f.type === "file" && f.name.endsWith(".html"));

              if (htmlFiles.length === 0) {
                listDiv.textContent = "(none yet)";
                return;
              }

              htmlFiles.forEach(file => {
                const a = document.createElement("a");
                a.href = `${folderName}/${file.name}`;
                a.textContent = prettyFile(file.name);
                listDiv.appendChild(a);
              });
            });
        });
      });
  </script>

</body>
</html>
