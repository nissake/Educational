<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Guess Flashcards</title>

<style>
  :root {
    --box-size: 48px;
    --box-font: 28px;
  }

  @media (max-width: 600px) {
    :root {
      --box-size: 38px;
      --box-font: 22px;
    }
  }

  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #eef3ff;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .app {
    width: 100%;
    max-width: 650px;
    background: white;
    padding: 24px;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 700px;
  }

  h1 {
    font-size: 30px;
    margin: 0;
    color: #1e3a8a;
    text-align: center;
  }

  #coin {
    font-size: 90px;
    opacity: 0;
    transition: opacity 0.4s ease;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #gotIt {
    font-size: 28px;
    font-weight: 700;
    color: #16a34a;
    opacity: 0;
    transition: opacity 0.3s ease;
    height: 40px;
    text-align: center;
  }

  #result {
    font-size: 22px;
    font-weight: bold;
    min-height: 40px;
    text-align: center;
  }

  #wordContainer {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    min-height: 150px;
    width: 100%;
    margin-top: 20px;
  }

  .letter-box {
    width: var(--box-size);
    height: var(--box-size);
    font-size: var(--box-font);
    border-radius: 10px;
    border: 2px solid #cbd5e1;
    text-align: center;
    text-transform: uppercase;
    background: white;
  }

  .correct {
    background: #bbf7d0;
    border-color: #16a34a;
  }

  .incorrect {
    background: #fecaca;
    border-color: #dc2626;
  }

  .yellow {
    background: #fef9c3;
    border-color: #eab308;
  }

  button {
    width: 100%;
    padding: 16px;
    margin-top: 12px;
    font-size: 22px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
  }

  #revealBtn {
    background: #6366f1;
    color: white;
  }

  #nextBtn {
    background: #22c55e;
    color: white;
  }
</style>
</head>

<body>
<div class="app">

  <h1>Word Guess</h1>

  <div id="coin">🪙</div>
  <div id="gotIt"></div>
  <div id="result"></div>

  <div id="wordContainer"></div>

  <button id="revealBtn">Reveal Answer</button>
  <button id="nextBtn">Next Word</button>

</div>

<script>
/* -----------------------------
   Word bank (200 words)
------------------------------ */
const WORD_BANK = [
  "planet","silver","forest","bridge","castle","wonder","bright","smooth","travel","puzzle",
  "candle","marble","thrive","spirit","gentle","fabric","motion","sacred","timber","glider",
  "rocket","singer","hunter","flower","stream","butter","charge","circle","dragon","energy",
  "family","galaxy","harbor","island","jungle","kitten","legend","magnet","nature","ocean",
  "pillow","quartz","rhythm","shadow","throat","united","velvet","window","yellow","zephyr",
  "anchor","beacon","copper","dancer","eagle","fusion","garden","hazard","impact","jester",
  "keeper","laptop","magnet","nectar","oracle","pencil","quiver","ribbon","saddle","temple",
  "urgent","vacuum","wander","xenial","yonder","zodiac","artist","breeze","cactus","daring",
  "empire","frozen","glassy","hammer","invent","jigsaw","kernel","liquid","magpie","nectar",
  "object","poetry","quaint","ranger","safety","tunnel","update","vacant","wealth","xylite",
  "yearly","zinger","across","battle","charge","doodle","effect","famous","gentle","hollow",
  "invent","jungle","kitten","little","marvel","notion","orange","pepper","quartz","rocket",
  "sudden","thrive","uplift","vacate","wonder","yellow","zebra","absorb","broken","caring",
  "demand","energy","fabric","growth","honest","impact","jovial","keeper","legend","moment",
  "native","object","praise","quiver","rescue","sacred","timber","unique","vision","wander",
  "xenial","yonder","zephyr","action","bottle","candle","danger","easily","frozen","glider",
  "hammer","island","jester","kitten","laptop","marble","nectar","oracle","pencil","quaint"
];

let usedWords = [];
let currentWord = "";
let blanks = [];
let score = 0;
let rounds = 0;
let yellowIndexes = [];

/* -----------------------------
   Pick a new unused word
------------------------------ */
function pickWord() {
  if (rounds >= 10) {
    finishGame();
    return;
  }

  let word;
  do {
    word = WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)];
  } while (usedWords.includes(word));

  usedWords.push(word);
  currentWord = word.toUpperCase();
  rounds++;

  setupWord();
}

/* -----------------------------
   Create blanks & inputs
------------------------------ */
function setupWord() {
  const container = document.getElementById("wordContainer");
  container.innerHTML = "";
  document.getElementById("coin").style.opacity = 0;
  document.getElementById("gotIt").style.opacity = 0;
  document.getElementById("result").textContent = "";

  blanks = [];
  yellowIndexes = [];

  let blankCount = Math.max(1, Math.floor(currentWord.length * 0.5));
  let yellowCount = Math.floor(Math.random() * 2) + 1;

  while (yellowIndexes.length < yellowCount) {
    let idx = Math.floor(Math.random() * currentWord.length);
    if (!yellowIndexes.includes(idx)) yellowIndexes.push(idx);
  }

  let blankIndexes = [];
  while (blankIndexes.length < blankCount) {
    let idx = Math.floor(Math.random() * currentWord.length);
    if (!blankIndexes.includes(idx)) blankIndexes.push(idx);
  }

  if (blankIndexes.length === currentWord.length) {
    blankIndexes.pop();
  }

  for (let i = 0; i < currentWord.length; i++) {
    const letter = currentWord[i];

    if (blankIndexes.includes(i)) {
      const box = document.createElement("input");
      box.maxLength = 1;
      box.className = "letter-box";
      box.dataset.index = i;

      box.addEventListener("input", checkLetter);
      container.appendChild(box);
      blanks.push(box);
    } else {
      const box = document.createElement("div");
      box.className = "letter-box correct";
      box.textContent = letter;
      container.appendChild(box);
    }
  }
}

/* -----------------------------
   Check letter correctness
------------------------------ */
function checkLetter(e) {
  const box = e.target;
  const index = parseInt(box.dataset.index);
  const correctLetter = currentWord[index];

  if (!box.value) {
    box.classList.remove("correct","incorrect","yellow");
    return;
  }

  if (yellowIndexes.includes(index)) {
    box.classList.add("yellow");
    box.classList.remove("correct","incorrect");
  } else {
    if (box.value.toUpperCase() === correctLetter) {
      box.classList.add("correct");
      box.classList.remove("incorrect","yellow");
    } else {
      box.classList.add("incorrect");
      box.classList.remove("correct","yellow");
    }
  }

  checkWordComplete();
}

/* -----------------------------
   Check if whole word is correct
------------------------------ */
function checkWordComplete() {
  for (let b of blanks) {
    const index = b.dataset.index;
    if (b.value.toUpperCase() !== currentWord[index]) return;
  }

  score++;

  document.getElementById("coin").style.opacity = 1;
  document.getElementById("gotIt").textContent = "Got it!";
  document.getElementById("gotIt").style.opacity = 1;

  setTimeout(() => {
    pickWord();
  }, 1500);
}

/* -----------------------------
   Reveal answer
------------------------------ */
document.getElementById("revealBtn").onclick = () => {
  const container = document.getElementById("wordContainer");
  container.innerHTML = "";

  for (let i = 0; i < currentWord.length; i++) {
    const box = document.createElement("div");
    box.className = "letter-box correct";
    box.textContent = currentWord[i];
    container.appendChild(box);
  }
};

/* -----------------------------
   Next word
------------------------------ */
document.getElementById("nextBtn").onclick = pickWord;

/* -----------------------------
   Finish screen
------------------------------ */
function finishGame() {
  document.getElementById("wordContainer").innerHTML = "";
  document.getElementById("coin").style.opacity = 0;
  document.getElementById("gotIt").style.opacity = 0;
  document.getElementById("result").textContent =
    "Finished! You got " + score + " out of 10 correct.";
  document.getElementById("revealBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
}

/* -----------------------------
   Start
------------------------------ */
pickWord();
</script>

</body>
</html>
