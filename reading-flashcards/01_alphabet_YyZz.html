<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcards</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    :root {
      --letter-size: 120px;
    }

    @media (max-width: 700px) {
      :root {
        --letter-size: 90px;
      }
    }

    @media (max-width: 480px) {
      :root {
        --letter-size: 70px;
      }
    }

    body {
      margin: 0;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 22px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      text-align: center;
      width: 100%;
      max-width: 420px;
    }

    .letter {
      font-size: var(--letter-size);
      font-weight: 800;
      margin-bottom: 30px;
      color: #1e293b;
    }

    button {
      font-size: 22px;
      padding: 12px 28px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      width: 120px;
    }

    .yes {
      background: #22c55e;
      color: white;
      box-shadow: 0 4px 10px rgba(34,197,94,0.4);
    }

    .no {
      background: #ef4444;
      color: white;
      box-shadow: 0 4px 10px rgba(239,68,68,0.4);
    }

    .tracker {
      margin-top: 30px;
      text-align: left;
      font-size: 20px;
    }

    .row {
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
    }

    .tiles {
      display: flex;
      flex-direction: row-reverse; /* newest on left */
      gap: 6px;
      flex-wrap: wrap;
    }

    .tile {
      width: 22px;
      height: 22px;
      border-radius: 6px;
    }

    .green { background: #22c55e; }
    .red { background: #ef4444; }

    .coin {
      font-size: 120px;
      margin: 20px 0;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #1e293b;
    }

    p {
      font-size: 18px;
      color: #475569;
    }
  </style>
</head>

<body>

  <div class="card">
    <div id="content">

      <div class="letter" id="letter"></div>

      <div>
        <button class="yes" onclick="answer(true)">Yes</button>
        <button class="no" onclick="answer(false)">No</button>
      </div>

      <div class="tracker" id="tracker"></div>

    </div>
  </div>

  <script>
    /* ================================
       EDIT FLASHCARD ITEMS HERE
       ================================ */

    const letters = ["Y", "y", "Z", "z"];

    document.title = `Flashcards`;

    const history = {};
    letters.forEach(letter => history[letter] = []);

    let currentLetter = "";
    let previousLetter = "";

    function chooseLetter() {
      const choices = letters.filter(letter => letter !== previousLetter);
      currentLetter = choices[Math.floor(Math.random() * choices.length)];
      previousLetter = currentLetter;

      document.getElementById("letter").textContent = currentLetter;
      updateTracker();
    }

    function answer(correct) {
      history[currentLetter].push(correct);
      updateTracker();

      if (isFinished()) {
        showVictory();
      } else {
        chooseLetter();
      }
    }

    function isFinished() {
      return letters.every(letter => {
        const h = history[letter];
        if (h.length < 3) return false;
        return h[h.length - 1] === true &&
               h[h.length - 2] === true &&
               h[h.length - 3] === true;
      });
    }

    function updateTracker() {
      const tracker = document.getElementById("tracker");

      tracker.innerHTML = letters.map(letter => {
        const tiles = history[letter]
          .map(result => `<span class="tile ${result ? 'green' : 'red'}"></span>`)
          .join("");

        return `
          <div class="row">
            <strong>${letter}</strong>
            <div class="tiles">${tiles}</div>
          </div>
        `;
      }).join("");
    }

    function showVictory() {
      document.getElementById("content").innerHTML = `
        <h1>Great Job!</h1>
        <div class="coin">🪙</div>
        <p>You earned a gold coin!</p>

        <div class="tracker">
          ${letters.map(letter => {
            const tiles = history[letter]
              .map(result => `<span class="tile ${result ? 'green' : 'red'}"></span>`)
              .join("");

            return `
              <div class="row">
                <strong>${letter}</strong>
                <div class="tiles">${tiles}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    chooseLetter();
  </script>

</body>
</html>
