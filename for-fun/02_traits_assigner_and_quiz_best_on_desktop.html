<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class/Object Property Grid</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }

  /* -------------------------
     INSTRUCTIONS
  --------------------------*/
  #instructions {
    font-size: 16px;
    margin-bottom: 14px;
  }

  /* -------------------------
     TOP BAR
  --------------------------*/
  .top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 12px;
    gap: 8px;
  }

  .left-buttons,
  .right-buttons {
    display: flex;
    gap: 8px;
  }

  .top-button,
  .utility-button {
    border: 1px solid black;   /* always-visible thin border */
  }

  .top-button {
    background: #cfe8ff;
    border-radius: 16px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 14px;
  }

  .top-button:hover,
  .top-button:focus-visible {
    background-color: #b5d8ff;
    outline: none;
  }

  .utility-button {
    background: #b9f6c9;
    border-radius: 12px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
  }

  .utility-button:hover,
  .utility-button:focus-visible {
    background-color: #9feeb4;
    outline: none;
  }

  /* -------------------------
     TABLE
  --------------------------*/
  table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
  }


#grid {
  border: 2px solid black;
  border-collapse: collapse;
}

#grid th,
#grid td {
  border: 1px solid #ccc;
}


  th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: center;
  }

  th {
    background: #e8e8e8;
    font-weight: bold;
  }

  /* Shade ONLY Property 1–7 header cells */
  th:nth-child(n+3) {
    background: #fff3a6;
  }

  td[contenteditable="true"] {
    background: white;
    outline: none;
  }

  .active-cell {
    background: #fff3a6 !important;
  }

  .separator-row td {
    background: #fafafa;
  }

  .class-row td {
    background: #e8f0ff;
  }

  .direct {
    background: #cce5ff !important;
  }

  .inherited {
    background: #e6e6e6 !important;
  }

  /* -------------------------
     QUIZ AREA
  --------------------------*/
  #quizArea {
    margin-top: 20px;
    padding: 15px;
    border: 2px solid black;
    width: 350px;
    display: none;
  }

  #quizQuestion {
    font-size: 20px;
    margin-bottom: 10px;
  }

  #quizFeedback {
    font-weight: bold;
    margin-top: 10px;
  }

.feedback-correct {
  background: #c8f7c5;   /* pastel green */
  padding: 6px;
  border-radius: 6px;
}

.feedback-incorrect {
  background: #f7c5c5;   /* pastel red */
  padding: 6px;
  border-radius: 6px;
}

.feedback-icon {
  font-size: 28px;
  margin-right: 8px;
  vertical-align: middle;
}


</style>
</head>
<body>

<div id="instructions">
  Type in your objects and classes in the yellow cells. Name your properties.
  Classless objects at the top. Below that, objects are in the class they are nested under.
  Attach properties by adding "x."
</div>

<!-- -------------------------
     TOP BAR
-------------------------- -->
<div class="top-bar">
  <div class="left-buttons">
    <button id="toggleBtn" class="top-button" tabindex="0">Take Quiz</button>
  </div>

  <div class="right-buttons">
    <button id="saveBtn" class="utility-button" tabindex="0">Save List</button>
    <button id="loadBtn" class="utility-button" tabindex="0">Load List</button>
  </div>
</div>

<!-- -------------------------
     LIST AREA
-------------------------- -->
<div id="listArea">
  <table id="grid">
    <thead>
      <tr>
        <th tabindex="0">Class</th>
        <th tabindex="0">Object</th>
        <th tabindex="0" contenteditable="true">Properties</th>
        <th tabindex="0" contenteditable="true"></th>
<th tabindex="0" contenteditable="true"></th>
<th tabindex="0" contenteditable="true"></th>
<th tabindex="0" contenteditable="true"></th>
<th tabindex="0" contenteditable="true"></th>
<th tabindex="0" contenteditable="true"></th>

      </tr>
    </thead>
    <tbody id="body">
      <!-- Rows inserted by JS -->
    </tbody>
  </table>
</div>

<!-- -------------------------
     QUIZ AREA
-------------------------- -->
<div id="quizArea">
  <div id="quizQuestion"></div>
  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>
  <div id="quizFeedback"></div>
</div>


<script>
/* -------------------------
   CONSTANTS
--------------------------*/
const ROW_COUNT = 40;
const PROPERTY_COUNT = 7;   // reduced from 9 → 7

const body = document.getElementById("body");
const listArea = document.getElementById("listArea");
const quizArea = document.getElementById("quizArea");
const toggleBtn = document.getElementById("toggleBtn");
const saveBtn = document.getElementById("saveBtn");
const loadBtn = document.getElementById("loadBtn");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let currentMode = "list";

/* -------------------------
   BUILD GRID
--------------------------*/
for (let i = 0; i < ROW_COUNT; i++) {
  const tr = document.createElement("tr");

  // 2 fixed columns + 7 property columns = 9 total
  for (let c = 0; c < 2 + PROPERTY_COUNT; c++) {
    const td = document.createElement("td");
    td.contentEditable = "true";
    td.tabIndex = 0;
    td.addEventListener("focus", handleFocus);
    td.addEventListener("input", handleInput);
    td.addEventListener("blur", handleBlur);
    td.addEventListener("keydown", handleKeyDown);
    tr.appendChild(td);
  }

  body.appendChild(tr);
}

/* -------------------------
   MODE TOGGLE
--------------------------*/
toggleBtn.addEventListener("click", toggleMode);

function toggleMode() {
  if (currentMode === "list") {
    currentMode = "quiz";
    listArea.style.display = "none";
    quizArea.style.display = "block";
    toggleBtn.textContent = "Make List";
    startQuiz();
  } else {
    currentMode = "list";
    listArea.style.display = "block";
    quizArea.style.display = "none";
    toggleBtn.textContent = "Take Quiz";
  }
}

/* -------------------------
   SAVE LIST
--------------------------*/
saveBtn.addEventListener("click", () => {
  const data = exportData();
  const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "list.json";
  a.click();
  URL.revokeObjectURL(url);
});

/* -------------------------
   LOAD LIST
--------------------------*/
loadBtn.addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => {
      const data = JSON.parse(reader.result);
      importData(data);
    };
    reader.readAsText(file);
  };
  input.click();
});

/* -------------------------
   EXPORT / IMPORT
--------------------------*/
function exportData() {
  const rows = [...body.children];
  const headers = [...document.querySelectorAll("th")].map(th => th.textContent);

  const grid = rows.map(r =>
    [...r.children].map(td => td.textContent)
  );

  return { headers, grid };
}

function importData(data) {
  const headers = [...document.querySelectorAll("th")];
  data.headers.forEach((h, i) => {
    if (i >= 2) headers[i].textContent = h;
  });

  const rows = [...body.children];
  data.grid.forEach((row, i) => {
    row.forEach((val, j) => {
      if (rows[i] && rows[i].children[j]) {
        rows[i].children[j].textContent = val;
      }
    });
  });

  refreshShading();
  refreshActiveCells();
}

/* -------------------------
   CELL EDITING
--------------------------*/
function handleFocus(e) {
  e.target.dataset.prev = e.target.textContent.trim();
}

function handleInput(e) {
  const cell = e.target;

  // Only property columns accept "x"
  if (cell.cellIndex >= 2) {
    const t = cell.textContent.trim().toLowerCase();
    cell.textContent = t === "x" ? "x" : "";
  }

  refreshShading();
}

function handleBlur(e) {
  const cell = e.target;
  const row = cell.parentElement;
  const prev = cell.dataset.prev || "";
  const now = cell.textContent.trim();

  if (cell.cellIndex === 0 && prev !== "" && now === "") clearClassSection(row);
  if (cell.cellIndex === 1 && prev !== "" && now === "") clearObjectRow(row);

  refreshShading();
  refreshActiveCells();
}

/* -------------------------
   ARROW‑KEY NAVIGATION
--------------------------*/
function handleKeyDown(e) {
  const cell = e.target;
  const row = cell.parentElement;
  const rows = [...body.children];
  const rowIndex = rows.indexOf(row);
  const colIndex = cell.cellIndex;

  const isHeader = cell.tagName === "TH";
  const virtualRow = isHeader ? -1 : rowIndex;

  function focusVirtual(r, c) {
    if (r === -2) {
      toggleBtn.focus();
      return;
    }
    if (r === -1) {
      const headerCells = [...document.querySelectorAll("thead th")];
      headerCells[c].focus();
      return;
    }
    if (r >= 0 && r < rows.length) {
      rows[r].children[c].focus();
    }
  }

  /* Y/N for quiz */
  if (currentMode === "quiz") {
    if (e.key.toLowerCase() === "y") { e.preventDefault(); yesBtn.click(); }
    if (e.key.toLowerCase() === "n") { e.preventDefault(); noBtn.click(); }
  }

  /* Arrow keys */
  if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
    e.preventDefault();

    const maxCol = 1 + PROPERTY_COUNT;

    if (e.key === "ArrowUp") {
      if (virtualRow === -1) focusVirtual(-2, colIndex);
      else if (virtualRow === 0) focusVirtual(-1, colIndex);
      else focusVirtual(virtualRow - 1, colIndex);
    }

    if (e.key === "ArrowDown") {
      if (virtualRow === -2) focusVirtual(-1, colIndex);
      else if (virtualRow === -1) focusVirtual(0, colIndex);
      else focusVirtual(virtualRow + 1, colIndex);
    }

    if (e.key === "ArrowLeft") {
      focusVirtual(virtualRow, Math.max(0, colIndex - 1));
    }

    if (e.key === "ArrowRight") {
      focusVirtual(virtualRow, Math.min(maxCol, colIndex + 1));
    }

    return;
  }

  /* Enter behavior */
  if (e.key === "Enter") {
    e.preventDefault();
    const isActive = cell.classList.contains("active-cell");
    const text = cell.textContent.trim();

    if (isActive) {
      cell.blur();
      if (text !== "") focusVirtual(virtualRow, 2);
      else focusNextActiveCell(cell);
      return;
    }

    if (colIndex >= 2) {
      if (colIndex < 1 + PROPERTY_COUNT)
        focusVirtual(virtualRow, colIndex + 1);
      else
        focusVirtual(virtualRow + 1, 2);
      return;
    }

    focusVirtual(virtualRow + 1, colIndex);
  }
}


/* -------------------------
   CLEARING LOGIC
--------------------------*/
function clearObjectRow(row) {
  for (let p = 2; p < 2 + PROPERTY_COUNT; p++) {
    row.children[p].textContent = "";
    row.children[p].dataset.inherited = "";
  }
}

function clearClassSection(classRow) {
  const rows = [...body.children];
  const index = rows.indexOf(classRow);

  for (let p = 2; p < 2 + PROPERTY_COUNT; p++) {
    classRow.children[p].textContent = "";
    classRow.children[p].dataset.inherited = "";
  }

  for (let i = index + 1; i < rows.length; i++) {
    const r = rows[i];
    if (isClassRow(r)) break;
    r.children[1].textContent = "";
    for (let p = 2; p < 2 + PROPERTY_COUNT; p++) {
      r.children[p].textContent = "";
      r.children[p].dataset.inherited = "";
    }
  }
}

/* -------------------------
   ROW TYPE HELPERS
--------------------------*/
function isClassRow(row) {
  return row.children[0].textContent.trim() !== "" &&
         row.children[1].textContent.trim() === "";
}

function isObjectRow(row) {
  return row.children[1].textContent.trim() !== "";
}

/* -------------------------
   ACTIVE YELLOW CELLS
--------------------------*/
function refreshActiveCells() {
  const rows = [...body.children];

  rows.forEach(r => {
    r.classList.remove("separator-row");
    [...r.children].forEach(td => td.classList.remove("active-cell"));
  });

const rowCount = rows.length;

let firstClassIndex = rowCount;
for (let i = 0; i < rowCount; i++) {
  if (isClassRow(rows[i])) {
    firstClassIndex = i;
    break;
  }
}

let lastClasslessObjIndex = -1;
for (let i = 0; i < firstClassIndex; i++) {
  const r = rows[i];
  if (r.children[0].textContent.trim() === "" &&
      r.children[1].textContent.trim() !== "") {
    lastClasslessObjIndex = i;
  }
}

let classlessActiveRow = lastClasslessObjIndex + 1;
if (classlessActiveRow < firstClassIndex && classlessActiveRow < rowCount) {
  const r = rows[classlessActiveRow];
  if (r.children[0].textContent.trim() === "" &&
      r.children[1].textContent.trim() === "") {
    r.children[1].classList.add("active-cell");
    if (classlessActiveRow + 1 < rowCount)
      rows[classlessActiveRow + 1].classList.add("separator-row");
    if (classlessActiveRow + 2 < rowCount) {
      const r2 = rows[classlessActiveRow + 2];
      if (r2.children[0].textContent.trim() === "" &&
          r2.children[1].textContent.trim() === "") {
        r2.children[0].classList.add("active-cell");
      }
    }
  }
}

for (let i = 0; i < rowCount; i++) {
  if (!isClassRow(rows[i])) continue;

  const classRowIndex = i;
  let nextClassIndex = rowCount;
  for (let j = classRowIndex + 1; j < rowCount; j++) {
    if (isClassRow(rows[j])) {
      nextClassIndex = j;
      break;
    }
  }

  let lastObjIndex = classRowIndex;
  for (let j = classRowIndex + 1; j < nextClassIndex; j++) {
    if (isObjectRow(rows[j])) lastObjIndex = j;
  }

  const activeObjRowIndex = lastObjIndex + 1;
  if (activeObjRowIndex < nextClassIndex && activeObjRowIndex < rowCount) {
    const r = rows[activeObjRowIndex];
    if (r.children[0].textContent.trim() === "" &&
        r.children[1].textContent.trim() === "") {
      r.children[1].classList.add("active-cell");
      if (activeObjRowIndex + 1 < rowCount)
        rows[activeObjRowIndex + 1].classList.add("separator-row");
      if (activeObjRowIndex + 2 < rowCount) {
        const r2 = rows[activeObjRowIndex + 2];
        if (r2.children[0].textContent.trim() === "" &&
            r2.children[1].textContent.trim() === "") {
          r2.children[0].classList.add("active-cell");
        }
      }
    }
  }
}
}

/* -------------------------
   PROPERTY SHADING / INHERITANCE
--------------------------*/
function refreshShading() {
  const rows = [...body.children];

  rows.forEach(r => {
    r.classList.remove("class-row");
    [...r.children].forEach(td => {
      td.classList.remove("direct", "inherited");
      if (td.dataset.inherited === "1") {
        td.textContent = "";
        td.dataset.inherited = "";
      }
    });
  });

  rows.forEach(r => {
    if (isClassRow(r)) r.classList.add("class-row");
  });

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const objectName = row.children[1].textContent.trim();

    for (let p = 2; p < 2 + PROPERTY_COUNT; p++) {
      if (row.children[p].textContent.trim() === "x") {
        row.children[p].classList.add("direct");
      }
    }

    if (objectName !== "") {
      const parentClass = findParentClass(rows, i);
      if (parentClass) {
        for (let p = 2; p < 2 + PROPERTY_COUNT; p++) {
          const cell = row.children[p];
          if (
            cell.textContent.trim() === "" &&
            parentClass.children[p].textContent.trim() === "x"
          ) {
            cell.textContent = "x";
            cell.classList.add("inherited");
            cell.dataset.inherited = "1";
          }
        }
      }
    }
  }
}

function findParentClass(rows, index) {
  for (let i = index - 1; i >= 0; i--) {
    if (isClassRow(rows[i])) return rows[i];
  }
  return null;
}

/* -------------------------
   QUIZ LOGIC
--------------------------*/
let quizList = [];
let current = null;

/* Create Next button dynamically */
const nextBtn = document.createElement("button");
nextBtn.id = "nextBtn";
nextBtn.textContent = "Next";
nextBtn.style.marginTop = "10px";
quizArea.appendChild(nextBtn);

nextBtn.disabled = true;

function startQuiz() {
  refreshShading();
  buildQuizList();
  if (quizList.length === 0) {
    document.getElementById("quizQuestion").textContent =
      "No renamed properties found.";
    document.getElementById("quizFeedback").textContent = "";
    return;
  }
  nextQuestion();
}

function buildQuizList() {
  quizList = [];
  const rows = [...body.children];

  const ths = [...document.querySelectorAll("th")];
  const props = ths
    .slice(2)
    .map((th, idx) => ({ name: th.textContent.trim(), index: idx + 2 }))
    .filter(p => p.name !== "")


  rows.forEach((row, rowIndex) => {
    const className = row.children[0].textContent.trim();
    const objectName = row.children[1].textContent.trim();
    if (!className && !objectName) return;

    const subject = objectName || className;
    const parentClass = findParentClass(rows, rowIndex);

    props.forEach(p => {
      const cell = row.children[p.index];
      const hasDirect = cell.textContent.trim() === "x";
      let hasInherited = false;

      if (!hasDirect && objectName && parentClass) {
        if (parentClass.children[p.index].textContent.trim() === "x") {
          hasInherited = true;
        }
      }

      const hasProp = hasDirect || hasInherited;

      quizList.push({
        subject,
        prop: p.name,
        answer: hasProp
      });
    });
  });
}

function nextQuestion() {
  if (quizList.length === 0) return;

  nextBtn.disabled = true;
  quizFeedback.innerHTML = "";
  quizFeedback.className = "";

  current = quizList[Math.floor(Math.random() * quizList.length)];
  document.getElementById("quizQuestion").textContent =
    `Is ${current.subject} ${current.prop}?`;
}


function answer(val) {
  if (!current) return;
  const fb = document.getElementById("quizFeedback");

  fb.classList.remove("feedback-correct", "feedback-incorrect");

  if (val === current.answer) {
    fb.innerHTML = `<span class="feedback-icon">🪙</span>Correct!`;
    fb.classList.add("feedback-correct");
  } else {
    fb.innerHTML = `<span class="feedback-icon">😖</span>Incorrect!`;
    fb.classList.add("feedback-incorrect");
  }

  nextBtn.disabled = false;
}

yesBtn.addEventListener("click", () => answer(true));
noBtn.addEventListener("click", () => answer(false));
nextBtn.addEventListener("click", nextQuestion);

document.addEventListener("keydown", e => {
  if (currentMode === "quiz") {

    if (e.key.toLowerCase() === "y") {
      e.preventDefault();
      yesBtn.click();
      return;
    }

    if (e.key.toLowerCase() === "n") {
      e.preventDefault();
      noBtn.click();
      return;
    }

    if (e.key === "Enter") {
      e.preventDefault();
      nextBtn.click();
      return;
    }
  }
});

/* -------------------------
   INITIAL RENDER
--------------------------*/
refreshShading();
refreshActiveCells();
</script>

</body>
</html>
